name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # ---------------------------------------------------------------
  # Build binaries for all target platforms
  # ---------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-14
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive_ext: tar.gz
            use_cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive_ext: tar.gz

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux ARM only)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --profile dist --target ${{ matrix.target }} -p scrapwell
          else
            cargo build --profile dist --target ${{ matrix.target }} -p scrapwell
          fi

      - name: Package (Unix)
        if: ${{ matrix.archive_ext == 'tar.gz' }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="scrapwell-${TAG}-${TARGET}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${TARGET}/dist/scrapwell" "dist/${ARCHIVE_NAME}/"
          cp LICENSE README.md "dist/${ARCHIVE_NAME}/"
          tar -czf "dist/${ARCHIVE_NAME}.tar.gz" -C dist "${ARCHIVE_NAME}"
          cd dist
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------
  # Generate the shell installer from the template
  # ---------------------------------------------------------------
  generate-installer:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate installer script
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed "s/{{VERSION}}/${VERSION}/g" scripts/installer.sh.template > scrapwell-installer.sh
          chmod +x scrapwell-installer.sh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: scrapwell-installer.sh
          retention-days: 1

  # ---------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------
  release:
    needs: [build, generate-installer]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create unified SHA256 checksum file
        run: |
          cd artifacts
          cat *.sha256 > "scrapwell-${{ github.ref_name }}-SHA256SUMS"
          rm *.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ -[a-zA-Z] ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            $PRERELEASE_FLAG \
            --title "scrapwell $TAG" \
            --generate-notes \
            artifacts/*.tar.gz \
            "artifacts/scrapwell-${TAG}-SHA256SUMS" \
            artifacts/scrapwell-installer.sh

  # ---------------------------------------------------------------
  # Update Homebrew tap (stable releases only)
  # ---------------------------------------------------------------
  update-homebrew:
    needs: release
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: argonism/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Compute SHA256 for each platform
        id: shas
        run: |
          TAG="${{ github.ref_name }}"
          BASE_URL="https://github.com/argonism/scrapwell/releases/download/${TAG}"

          download_sha() {
            local target="$1"
            local ext="$2"
            curl --proto '=https' --tlsv1.2 -fsSL "${BASE_URL}/scrapwell-${TAG}-${target}.${ext}" \
              | sha256sum | cut -d' ' -f1
          }

          echo "sha_aarch64_mac=$(download_sha aarch64-apple-darwin tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_x86_mac=$(download_sha x86_64-apple-darwin tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_linux=$(download_sha aarch64-unknown-linux-gnu tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_x86_linux=$(download_sha x86_64-unknown-linux-gnu tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Write Homebrew formula
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/argonism/scrapwell/releases/download/${TAG}"

          mkdir -p Formula
          cat > Formula/scrapwell.rb << FORMULA
          class Scrapwell < Formula
            desc "MCP memory server for LLM agents"
            homepage "https://github.com/argonism/scrapwell"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/scrapwell-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_aarch64_mac }}"
              end
              on_intel do
                url "${BASE_URL}/scrapwell-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_x86_mac }}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/scrapwell-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_aarch64_linux }}"
              end
              on_intel do
                url "${BASE_URL}/scrapwell-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_x86_linux }}"
              end
            end

            def install
              bin.install "scrapwell"
            end

            test do
              system "#{bin}/scrapwell", "--version"
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scrapwell.rb
          git commit -m "scrapwell ${VERSION}"
          git push
